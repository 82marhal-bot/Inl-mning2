name: CI/CD Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-test:
    name: Build & Test
    runs-on: ubuntu-latest

    steps:
      - name: Hämta koden
        uses: actions/checkout@v4

      - name: Installera .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Återställ beroenden
        run: dotnet restore

      - name: Bygg applikationen
        run: dotnet build --no-restore --configuration Release

      - name: Kör tester
        run: dotnet test --no-build --configuration Release --verbosity normal

  infrastructure:
    name: Driftsätt infrastruktur
    runs-on: ubuntu-latest
    needs: build-and-test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Hämta koden
        uses: actions/checkout@v4

      - name: Logga in på Azure
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Skapa resursgrupp om den inte finns
        run: |
          az group create \
            --name rg-artgallery-dev \
            --location northeurope

      - name: Driftsätt Bicep
        run: |
          az deployment group create \
            --resource-group rg-artgallery-dev \
            --template-file infrastructure/main.bicep \
            --parameters sshPublicKey="${{ secrets.SSH_PUBLIC_KEY }}" \
            --mode Incremental

  deploy:
    name: Driftsätt applikation
    runs-on: ubuntu-latest
    needs: [build-and-test, infrastructure]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Hämta koden
        uses: actions/checkout@v4

      - name: Installera .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Publicera applikationen
        run: dotnet publish ArtGallery/ArtGallery.csproj --configuration Release --output ./publish

      - name: Driftsätt via Bastion till App Server
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_rsa
          # Tvätta nyckeln från eventuella Windows-radbrytningar
          sed -i 's/\r$//' ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          
          # 1. Rensa och bygg upp known_hosts
          ssh-keyscan -H ${{ secrets.BASTION_HOST }} >> ~/.ssh/known_hosts
          ssh-keyscan -H ${{ secrets.APP_SERVER_IP }} >> ~/.ssh/known_hosts
          
          # 2. Skapa mappen (nu med -v för att se EXAKT vad som händer)
          ssh -v -o StrictHostKeyChecking=no -o ProxyJump=azureuser@${{ secrets.BASTION_HOST }} \
            azureuser@${{ secrets.APP_SERVER_IP }} \
            "sudo mkdir -p /var/www/artgallery && sudo chown azureuser:azureuser /var/www/artgallery"

          # 3. Kopiera filerna
          scp -o StrictHostKeyChecking=no -o ProxyJump=azureuser@${{ secrets.BASTION_HOST }} \
            -r ./publish/* \
            azureuser@${{ secrets.APP_SERVER_IP }}:/var/www/artgallery/

          # 4. Starta om tjänsten
          ssh -o StrictHostKeyChecking=no -o ProxyJump=azureuser@${{ secrets.BASTION_HOST }} \
            azureuser@${{ secrets.APP_SERVER_IP }} \
            "sudo systemctl restart artgallery"