name: CI/CD Pipeline

on:
  push:
    branches: [ main ]
  pull_request: [ main ]

jobs:
  build-and-test:
    name: Build & Test
    runs-on: ubuntu-latest
    steps:
      - name: Hämta koden
        uses: actions/checkout@v4
      - name: Installera .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'
      - name: Återställ & Bygg
        run: |
          dotnet restore
          dotnet build --no-restore --configuration Release
      - name: Kör tester
        run: dotnet test --no-build --configuration Release

  infrastructure:
    name: Driftsätt infrastruktur
    runs-on: ubuntu-latest
    needs: build-and-test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - name: Hämta koden
        uses: actions/checkout@v4
      - name: Logga in på Azure
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}
      - name: Driftsätt Bicep
        run: |
          az group create --name rg-artgallery-dev --location northeurope
          az deployment group create \
            --resource-group rg-artgallery-dev \
            --template-file infrastructure/main.bicep \
            --parameters sshPublicKey="${{ secrets.SSH_PUBLIC_KEY }}" \
            --mode Incremental

  deploy:
    name: Driftsätt applikation
    runs-on: ubuntu-latest
    needs: [build-and-test, infrastructure]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - name: Hämta koden
        uses: actions/checkout@v4
      - name: Installera .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'
      - name: Publicera Applikation
        run: dotnet publish ArtGallery/ArtGallery.csproj --configuration Release --runtime linux-x64 --self-contained true -p:PublishSingleFile=true --output ./publish

      - name: Driftsätt via Bastion
        run: |
          mkdir -p ~/.ssh
          printf "%s\n" "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          cat <<EOF > ~/.ssh/config
          Host *
            StrictHostKeyChecking no
            UserKnownHostsFile /dev/null
            LogLevel ERROR
          EOF

          # --- APP SERVER: FÖRBEREDELSER ---
          ssh -o ProxyJump=azureuser@${{ secrets.BASTION_HOST }} azureuser@${{ secrets.APP_SERVER_IP }} "sudo systemctl stop artgallery || true"
          ssh -o ProxyJump=azureuser@${{ secrets.BASTION_HOST }} azureuser@${{ secrets.APP_SERVER_IP }} "sudo rm -rf /var/www/artgallery/* && sudo mkdir -p /var/www/artgallery/keys && sudo chown -R azureuser:azureuser /var/www/artgallery"

          # --- APP SERVER: KOPIERING ---
          scp -o ProxyJump=azureuser@${{ secrets.BASTION_HOST }} -r ./publish/* azureuser@${{ secrets.APP_SERVER_IP }}:/var/www/artgallery/

          # --- APP SERVER: STARTA MED COSMOS DB INFO ---
          ssh -o ProxyJump=azureuser@${{ secrets.BASTION_HOST }} azureuser@${{ secrets.APP_SERVER_IP }} "chmod +x /var/www/artgallery/ArtGallery && \
          echo '[Unit]
          Description=ArtGallery App
          After=network.target

          [Service]
          WorkingDirectory=/var/www/artgallery
          ExecStart=/var/www/artgallery/ArtGallery
          Restart=always
          RestartSec=10
          User=azureuser
          Environment=ASPNETCORE_ENVIRONMENT=Production
          Environment=ASPNETCORE_URLS=http://0.0.0.0:5000
          Environment=ASPNETCORE_DATAPROTECTION__KEYMANAGEMENTOPTIONS__XMLREPOSITORY__DIRECTORYPATH=/var/www/artgallery/keys
          Environment=CosmosDb__ConnectionString=${{ secrets.COSMOSDB_CONNECTION_STRING }}
          Environment=CosmosDb__DatabaseName=ArtGalleryDb
          Environment=CosmosDb__ContainerName=ArtItems

          [Install]
          WantedBy=multi-user.target' | sudo tee /etc/systemd/system/artgallery.service && \
          sudo systemctl daemon-reload && sudo systemctl enable artgallery && sudo systemctl restart artgallery"

          # --- PROXY SERVER: NGINX ---
          ssh -o ProxyJump=azureuser@${{ secrets.BASTION_HOST }} azureuser@10.0.1.4 "sudo apt-get update && sudo apt-get install -y nginx && \
          echo 'server {
                listen 80;
                location / {
                    proxy_pass http://${{ secrets.APP_SERVER_IP }}:5000;
                    proxy_http_version 1.1;
                    proxy_set_header Upgrade \$http_upgrade;
                    proxy_set_header Connection \"upgrade\";
                    proxy_set_header Host \$host;
                    proxy_cache_bypass \$http_upgrade;
                }
            }' | sudo tee /etc/nginx/sites-available/default && sudo systemctl restart nginx"