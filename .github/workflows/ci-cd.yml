name: CI/CD Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-test:
    name: Build & Test
    runs-on: ubuntu-latest

    steps:
      - name: Hämta koden
        uses: actions/checkout@v4

      - name: Installera .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Återställ beroenden
        run: dotnet restore

      - name: Bygg applikationen
        run: dotnet build --no-restore --configuration Release

      - name: Kör tester
        run: dotnet test --no-build --configuration Release --verbosity normal

  infrastructure:
    name: Driftsätt infrastruktur
    runs-on: ubuntu-latest
    needs: build-and-test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Hämta koden
        uses: actions/checkout@v4

      - name: Logga in på Azure
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Skapa resursgrupp om den inte finns
        run: |
          az group create \
            --name rg-artgallery-dev \
            --location northeurope

      - name: Driftsätt Bicep
        run: |
          az deployment group create \
            --resource-group rg-artgallery-dev \
            --template-file infrastructure/main.bicep \
            --parameters sshPublicKey="${{ secrets.SSH_PUBLIC_KEY }}" \
            --mode Incremental

  deploy:
    name: Driftsätt applikation
    runs-on: ubuntu-latest
    needs: [build-and-test, infrastructure]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Hämta koden
        uses: actions/checkout@v4

      - name: Installera .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Publicera applikationen
        run: dotnet publish ArtGallery/ArtGallery.csproj --configuration Release --output ./publish

      - name: Driftsätt via Bastion till App Server
        run: |
          mkdir -p ~/.ssh
          printf "%s\n" "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          
          # Vi definierar strikta regler för att ignorera host-keys i båda hoppen
          SSH_OPTS="-o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null"
          PROXY_OPTS="-o ProxyJump=azureuser@${{ secrets.BASTION_HOST }} -o ProxyCommand='ssh -W %h:%p $SSH_OPTS azureuser@${{ secrets.BASTION_HOST }}'"

          # TEST 1: Kommer vi in i Bastion? (Detta vet vi funkar nu!)
          ssh $SSH_OPTS azureuser@${{ secrets.BASTION_HOST }} "echo 'Steg 1: Bastion OK!'"

          # Om steg 1 funkar, kör vi resten via hoppet
          ssh $SSH_OPTS $PROXY_OPTS azureuser@${{ secrets.APP_SERVER_IP }} \
            "sudo mkdir -p /var/www/artgallery && sudo chown azureuser:azureuser /var/www/artgallery"

          scp $SSH_OPTS $PROXY_OPTS -r ./publish/* \
            azureuser@${{ secrets.APP_SERVER_IP }}:/var/www/artgallery/

          ssh $SSH_OPTS $PROXY_OPTS azureuser@${{ secrets.APP_SERVER_IP }} \
            "sudo systemctl restart artgallery"