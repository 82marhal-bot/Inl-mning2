name: CI/CD Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-test:
    name: Build & Test
    runs-on: ubuntu-latest

    steps:
      - name: Hämta koden
        uses: actions/checkout@v4

      - name: Installera .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Återställ beroenden
        run: dotnet restore

      - name: Bygg applikationen
        run: dotnet build --no-restore --configuration Release

      - name: Kör tester
        run: dotnet test --no-build --configuration Release --verbosity normal

  infrastructure:
    name: Driftsätt infrastruktur
    runs-on: ubuntu-latest
    needs: build-and-test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Hämta koden
        uses: actions/checkout@v4

      - name: Logga in på Azure
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Skapa resursgrupp om den inte finns
        run: |
          az group create \
            --name rg-artgallery-dev \
            --location northeurope

      - name: Driftsätt Bicep
        run: |
          az deployment group create \
            --resource-group rg-artgallery-dev \
            --template-file infrastructure/main.bicep \
            --parameters sshPublicKey="${{ secrets.SSH_PUBLIC_KEY }}" \
            --mode Incremental

  deploy:
    name: Driftsätt applikation
    runs-on: ubuntu-latest
    needs: [build-and-test, infrastructure]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Hämta koden
        uses: actions/checkout@v4

      - name: Installera .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Publicera applikationen
        run: dotnet publish ArtGallery/ArtGallery.csproj --configuration Release --output ./publish

      - name: Driftsätt via Bastion till App Server
        run: |
          mkdir -p ~/.ssh
          printf "%s\n" "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          
          cat <<EOF > ~/.ssh/config
          Host *
            StrictHostKeyChecking no
            UserKnownHostsFile /dev/null
            LogLevel ERROR
          EOF
          chmod 600 ~/.ssh/config

          # Steg 1: Skapa mapp på App-servern
          ssh -o ProxyJump=azureuser@${{ secrets.BASTION_HOST }} \
            azureuser@${{ secrets.APP_SERVER_IP }} \
            "sudo mkdir -p /var/www/artgallery && sudo chown azureuser:azureuser /var/www/artgallery"

          # Steg 2: Kopiera filer
          scp -o ProxyJump=azureuser@${{ secrets.BASTION_HOST }} \
            -r ./publish/* \
            azureuser@${{ secrets.APP_SERVER_IP }}:/var/www/artgallery/

          # Steg 3: Fixa Nginx på Proxy-servern (Installera om det behövs)
          ssh -o ProxyJump=azureuser@${{ secrets.BASTION_HOST }} \
            azureuser@10.0.1.4 \
            "sudo apt-get update && sudo apt-get install -y nginx"

          # Steg 4: Konfigurera Reverse Proxy (Pekar mot port 5000)
          ssh -o ProxyJump=azureuser@${{ secrets.BASTION_HOST }} \
            azureuser@10.0.1.4 \
            "echo 'server {
                listen 80;
                location / {
                    proxy_pass http://${{ secrets.APP_SERVER_IP }}:5000;
                    proxy_http_version 1.1;
                    proxy_set_header Upgrade \$http_upgrade;
                    proxy_set_header Connection keep-alive;
                    proxy_set_header Host \$host;
                    proxy_cache_bypass \$http_upgrade;
                }
            }' | sudo tee /etc/nginx/sites-available/default && sudo systemctl restart nginx"

          # Steg 5: Starta om tjänsten med binding till 0.0.0.0
          ssh -o ProxyJump=azureuser@${{ secrets.BASTION_HOST }} \
            azureuser@${{ secrets.APP_SERVER_IP }} \
            "sudo systemctl set-environment ASPNETCORE_URLS=http://0.0.0.0:5000 && sudo systemctl restart artgallery"